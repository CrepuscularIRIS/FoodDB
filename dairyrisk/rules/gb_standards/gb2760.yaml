# GB 2760-2014 食品安全国家标准 食品添加剂使用标准
standard_no: "GB 2760-2014"
standard_name: "食品安全国家标准 食品添加剂使用标准"
applicable_products:
  - all

indicators:
  - name: "防腐剂"
    threshold: 0
    operator: "="
    unit: "mg/kg"
    risk_type: "添加剂"
    severity: "high"
    test_method: "GB 5009.28"
    action_suggestion: "纯牛奶中不得添加防腐剂，建议严查违规添加"

  - name: "山梨酸"
    threshold: 0
    operator: "="
    unit: "mg/kg"
    risk_type: "添加剂"
    severity: "high"
    test_method: "GB 5009.28"
    action_suggestion: "巴氏杀菌乳、灭菌乳中不得添加"

  - name: "苯甲酸"
    threshold: 0
    operator: "="
    unit: "mg/kg"
    risk_type: "添加剂"
    severity: "high"
    test_method: "GB 5009.28"
    action_suggestion: "巴氏杀菌乳、灭菌乳中不得添加"

  - name: "三聚氰胺"
    threshold: 2.5
    operator: "<="
    unit: "mg/kg"
    risk_type: "安全"
    severity: "high"
    test_method: "GB/T 22388"
    action_suggestion: "严禁人为添加，建议追溯原料来源"

  - name: "黄曲霉毒素M1"
    threshold: 0.5
    operator: "<="
    unit: "μg/kg"
    risk_type: "安全"
    severity: "high"
    test_method: "GB 5009.24"
    action_suggestion: "原料乳带入，建议加强原料筛选"

  - name: "皮革水解蛋白"
    threshold: 0
    operator: "="
    unit: "mg/kg"
    risk_type: "安全"
    severity: "high"
    test_method: "GB/T 24800"
    action_suggestion: "严禁添加，建议追溯原料来源"

notes: |
  GB 2760规定了食品添加剂的使用原则、允许使用的品种、使用范围及最大使用量。
  乳制品中严禁添加防腐剂、皮革水解蛋白等非法物质。
  黄曲霉毒素M1是原料乳中可能存在的天然污染物，需控制在限量以下。
