# GB 19301-2010 食品安全国家标准 生乳
standard_no: "GB 19301-2010"
standard_name: "食品安全国家标准 生乳"
applicable_products:
  - raw_milk

indicators:
  - name: "蛋白质"
    threshold: 2.8
    operator: ">="
    unit: "g/100g"
    risk_type: "营养"
    severity: "medium"
    test_method: "GB 5009.5"
    action_suggestion: "建议加强饲料管理，提高乳蛋白含量"

  - name: "脂肪"
    threshold: 3.1
    operator: ">="
    unit: "g/100g"
    risk_type: "营养"
    severity: "low"
    test_method: "GB 5413.3"
    action_suggestion: "建议调整泌乳期管理"

  - name: "菌落总数"
    threshold: 2000000
    operator: "<="
    unit: "CFU/mL"
    risk_type: "微生物"
    severity: "high"
    test_method: "GB 4789.2"
    action_suggestion: "建议立即排查挤奶设备和储奶罐卫生状况"

  - name: "体细胞数"
    threshold: 600000
    operator: "<="
    unit: "个/mL"
    risk_type: "微生物"
    severity: "medium"
    test_method: "GB 5413.30"
    action_suggestion: "建议检查奶牛健康状况"

  - name: "铅"
    threshold: 0.05
    operator: "<="
    unit: "mg/kg"
    risk_type: "安全"
    severity: "high"
    test_method: "GB 5009.12"
    action_suggestion: "建议检查饲料和水源"

  - name: "黄曲霉毒素M1"
    threshold: 0.5
    operator: "<="
    unit: "μg/kg"
    risk_type: "安全"
    severity: "high"
    test_method: "GB 5009.24"
    action_suggestion: "建议排查饲料来源，加强原料乳筛选"
