# GB 19645-2010 食品安全国家标准 巴氏杀菌乳
standard_no: "GB 19645-2010"
standard_name: "食品安全国家标准 巴氏杀菌乳"
applicable_products:
  - pasteurized

indicators:
  - name: "蛋白质"
    threshold: 2.9
    operator: ">="
    unit: "g/100g"
    risk_type: "营养"
    severity: "medium"
    test_method: "GB 5009.5"
    action_suggestion: "建议检查原料乳质量"

  - name: "脂肪"
    threshold: 3.1
    operator: ">="
    unit: "g/100g"
    risk_type: "营养"
    severity: "low"
    test_method: "GB 5413.3"
    action_suggestion: "建议调整配方或原料选择"

  - name: "菌落总数"
    threshold: 100000
    operator: "<="
    unit: "CFU/mL"
    risk_type: "微生物"
    severity: "high"
    test_method: "GB 4789.2"
    action_suggestion: "建议立即排查冷链和杀菌工艺，召回同批次产品"

  - name: "大肠菌群"
    threshold: 10
    operator: "<="
    unit: "CFU/mL"
    risk_type: "微生物"
    severity: "high"
    test_method: "GB 4789.3"
    action_suggestion: "建议立即停产排查卫生状况，召回产品"

  - name: "金黄色葡萄球菌"
    threshold: 0
    operator: "="
    unit: "CFU/mL"
    risk_type: "微生物"
    severity: "high"
    test_method: "GB 4789.10"
    action_suggestion: "致病菌检出，建议召回同批次产品，全面消毒"

  - name: "沙门氏菌"
    threshold: 0
    operator: "="
    unit: "CFU/25mL"
    risk_type: "微生物"
    severity: "high"
    test_method: "GB 4789.4"
    action_suggestion: "致病菌检出，建议召回同批次产品，全面消毒"

  - name: "铅"
    threshold: 0.05
    operator: "<="
    unit: "mg/kg"
    risk_type: "安全"
    severity: "high"
    test_method: "GB 5009.12"
    action_suggestion: "建议检查生产设备和包装材料"

notes: |
  巴氏杀菌乳应在2-6°C条件下储存和运输，保质期一般为7-15天。
  冷链断链是导致微生物超标的主要原因。
